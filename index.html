<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Panel Layout Tool</title>

<link rel="stylesheet" href="styles.css">

</head>

<body>

<header>
Panel Layout Tool
</header>

<div class="container">

<div class="card">

<label>Wall Type</label>
<select id="wallType">
<option value="sidewall">Sidewall</option>
<option value="gable">Gable Wall</option>
</select>

<label>Wall Length (inches)</label>
<input id="wallLength" type="number" placeholder="e.g. 144">

<label>Gable Height (inches)</label>
<input id="gableHeight" type="number" placeholder="e.g. 60">

<label>Rib Spacing (inches)</label>
<input id="ribSpacing" type="number" value="12">

<label>Panel Coverage (inches)</label>
<input id="panelCoverage" type="number" value="36">

<label>Start Offset (inches)</label>
<input id="offset" type="number" placeholder="e.g. 5">

<button id="renderBtn">Generate Layout</button>

</div>

<div class="card">

<div id="svgContainer">
<svg id="wallSvg" width="100%" height="300"></svg>
</div>

</div>

<div class="card">

<h3>Layout Summary</h3>

<div id="ribTable"></div>

</div>

</div>

<script type="module" src="js/app.js"></script>

</body>
</html>
